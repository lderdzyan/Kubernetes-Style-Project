name: Apply ArgoCD 

on: 
  workflow_dispatch:
    inputs:
      instance:
        type: choice
        description: "Choose the instance"
        required: true
        default: "dev"
        options:
          - dev
          - staging
          - prod
jobs:
  apply-argocd:
    environment: ${{ inputs.instance }}
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Assuming federated role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_FED_ROLE_ARN }}
          role-session-name: KubeRole

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Install ArgoCD
        run: |
          kubectl create namespace argocd || true

          kubectl apply -n argocd \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

      - name: Wait for ArgoCD
        run: |
          kubectl rollout status deployment/argocd-server -n argocd --timeout=300s

      - name: Apply ArgoCD configs
        run: |
          kubectl apply -f argocd/

      - name: Check ArgoCD apps
        run: |
          kubectl get applications -n argocd