apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kubeproject
  namespace: argocd
spec:
  description: Kubeproject environments (dev/staging/prod)

  sourceRepos:
    - https://github.com/lderdzyan/Kubernetes-Style-Project.git

  destinations:
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'